<IfModule mod_deflate.c>
    # Comprimir contenido típico web
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
    AddOutputFilterByType DEFLATE application/javascript application/x-javascript text/javascript
    AddOutputFilterByType DEFLATE application/json application/xml
    AddOutputFilterByType DEFLATE image/svg+xml

    # (Opcional) Nivel de compresión (equilibrio CPU/ahorro)
    DeflateCompressionLevel 6

    # Añade una cabecera para ver fácilmente si se aplicó (útil en evidencias)
    Header append Vary Accept-Encoding

    # EXCLUSIONES: no comprimir binarios ya comprimidos (imágenes/video/audio/archivos comprimidos)
    SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png|webp|avif|ico|mp4|mpe?g|mov|avi|mkv|mp3|ogg|wav|gz|zip|rar|7z|bz2|tgz|pdf)$ no-gzip dont-vary

    # Evitar problemas con proxies antiguos (clásico)
    BrowserMatch ^Mozilla/4 gzip-only-text/html
    BrowserMatch ^Mozilla/4\.0[678] no-gzip
    BrowserMatch \bMSIE !no-gzip !gzip-only-text/html
</IfModule>
